  <!-- Google Fonts -->

</head>
<body>

  <!-- Navegación principal -->

    <a href="#" class="nav-item">

      <!-- Opción de menú -->
    </a>

    <a href="#" class="nav-item">
      <span class="nav-icon"><i class="fas fa-calendar-check"></i></span>
      <!-- Opción de menú -->
    </a>
  </nav>

  <!-- Segunda sección de navegación -->
  <nav class="nav-section">
    <div class="nav-section-label"><!-- Nombre de sección --></div>

    <a href="#" class="nav-item">
      <span class="nav-icon"><i class="fas fa-chart-pie"></i></span>
      <!-- Opción de menú -->
    </a>

    <a href="#" class="nav-item">
      <span class="nav-icon"><i class="fas fa-cog"></i></span>

    </a>
  </nav>

  <!-- Usuario / Perfil lateral -->

      <div class="user-info">

</aside>

<!-- ════════ CONTENEDOR PRINCIPAL ════════ -->
<div class="main-wrap">

  <!-- TOPBAR -->

    <button class="hamburger" id="hamburgerBtn" aria-label="Abrir o cerrar menú lateral">
      <i class="fas fa-bars"></i>
    </button>

    <div class="topbar-title">
      <!-- Título de página -->
      <span><!-- Subtítulo / ruta --></span>
    </div>

    <!-- Buscador -->
    <div class="topbar-search">
      <i class="fas fa-search"></i>
      <input type="text" placeholder="Buscar..." />
    </div>

    <div class="topbar-actions">
      <button class="topbar-btn" title="Notificaciones">
        <i class="fas fa-bell"></i>
        <!-- <span class="badge">0</span> -->
      </button>

      <button class="topbar-btn" title="Mensajes">
        <i class="fas fa-envelope"></i>
        <!-- <span class="badge">0</span> -->
      </button>

      <div class="topbar-divider"></div>

      <div class="topbar-profile">
        <div class="avatar-placeholder"><!-- IN --></div>
        <div>
          <div class="profile-name"><!-- Nombre --></div>
          <div class="profile-role"><!-- Rol --></div>
        </div>
        <i class="fas fa-chevron-down"></i>
      </div>
    </div>
  </header>

  <!-- CONTENIDO DE PÁGINA -->
  <main class="page-content">

    <!-- ── BANNER PRINCIPAL ── -->
    <section class="welcome-card">
      <div class="welcome-text">
        <div class="welcome-greeting">
          <i class="fas fa-sun me-1"></i>
          <!-- Saludo o etiqueta -->

        <div class="welcome-name">
          <!-- Título principal del banner -->
          <span><!-- Texto destacado --></span>
        </div>
        <div class="welcome-sub">
          <!-- Descripción breve del módulo, sistema o pantalla -->
        </div>
      </div>

      <div class="welcome-stats">
        <div class="w-stat">
          <div class="w-stat-icon"><i class="fas fa-chart-line"></i></div>
          <div class="w-stat-num"><!-- 0 --></div>
          <div class="w-stat-label"><!-- Indicador --></div>
        </div>

        <div class="w-stat">
          <div class="w-stat-icon"><i class="fas fa-users"></i></div>
          <div class="w-stat-num"><!-- 0 --></div>
          <div class="w-stat-label"><!-- Indicador --></div>
        </div>

        <div class="w-stat">
          <div class="w-stat-icon"><i class="fas fa-database"></i></div>
          <div class="w-stat-num"><!-- 0 --></div>
          <div class="w-stat-label"><!-- Indicador --></div>
        </div>
      </div>
    </section>

    <!-- ── TARJETAS DE ESTADÍSTICAS ── -->
    <section class="stat-cards">
      <div class="stat-card">
        <div class="stat-icon-wrap orange"><i class="fas fa-chart-bar"></i></div>
        <div class="stat-info">
          <div class="stat-num"><!-- 0 --></div>
          <div class="stat-label"><!-- Nombre del indicador --></div>
          <div class="stat-change up"><!-- Variación o nota --></div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon-wrap green"><i class="fas fa-plus"></i></div>
        <div class="stat-info">
          <div class="stat-num"><!-- 0 --></div>
          <div class="stat-label"><!-- Nombre del indicador --></div>
          <div class="stat-change up"><!-- Variación o nota --></div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon-wrap blue"><i class="fas fa-list"></i></div>
        <div class="stat-info">
          <div class="stat-num"><!-- 0 --></div>
          <div class="stat-label"><!-- Nombre del indicador --></div>
          <div class="stat-change down"><!-- Variación o nota --></div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon-wrap red"><i class="fas fa-exclamation-circle"></i></div>
        <div class="stat-info">
          <div class="stat-num"><!-- 0 --></div>
          <div class="stat-label"><!-- Nombre del indicador --></div>
          <div class="stat-change down"><!-- Variación o nota --></div>
        </div>
      </div>
    </section>

    <!-- ── ACCIONES RÁPIDAS ── -->

      <div class="section-header">
        <div class="section-title">

        <a href="#" class="action-card">

        </a>

        <a href="#" class="action-card">
          <div class="action-icon"><i class="fas fa-file"></i></div>
          <div>
            <div class="action-label"><!-- Acción --></div>

    </section>

    <!-- ── FILA DE GRÁFICAS / TARJETAS ── -->

      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <i class="fas fa-chart-area"></i>
            <!-- Título de gráfica -->
          </div>
          <a href="#" class="card-action"><!-- Acción --></a>
        </div>

        <div class="chart-area" id="activityChart">
          <!-- Las barras se generan desde JavaScript. Edita chartData al final del archivo. -->
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <i class="fas fa-chart-pie"></i>
            <!-- Título de tarjeta -->
          </div>

        <div class="donut-area">

              <span class="legend-dot"></span>
              <!-- Categoría -->

        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <i class="fas fa-info-circle"></i>
            <!-- Título de tarjeta -->
          </div>
          <a href="#" class="card-action"><!-- Acción --></a>
        </div>

        <div>
          <!-- Contenido libre -->
        </div>
      </div>

    </section>

    <!-- ── TABLA + LISTA LATERAL ── -->

      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <i class="fas fa-table"></i>
            <!-- Título de tabla -->
          </div>
          <a href="#" class="card-action"><!-- Acción --></a>
        </div>

        <table class="patient-table">
          <thead>
            <tr>
              <th><!-- Columna 1 --></th>
              <th><!-- Columna 2 --></th>
              <th><!-- Columna 3 --></th>
              <th><!-- Columna 4 --></th>
              <th><!-- Columna 5 --></th>
            </tr>
          </thead>
          <tbody>
            <!-- Agrega tus filas aquí -->
          </tbody>

      <div class="card">
        <div class="card-header">
          <div class="card-title">
            <i class="fas fa-list-ul"></i>
            <!-- Título de lista -->
          </div>
          <a href="#" class="card-action"><!-- Acción --></a>
        </div>

        <div class="doctor-list">
          <!-- Agrega tus elementos aquí -->
        </div>

        <div class="card-header" style="margin-top:1.4rem;padding-top:1.2rem;border-top:1px solid var(--border);">
          <div class="card-title">
            <i class="fas fa-history"></i>
            <!-- Título de actividad -->
          </div>
        </div>

        <div class="activity-list">
          <!-- Agrega actividades aquí -->
        </div>
      </div>

    </section>

  </main>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ── Sidebar toggle móvil ── */
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebarOverlay');
const hamburger = document.getElementById('hamburgerBtn');

if (hamburger && sidebar && overlay) {
  hamburger.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('active');
  });

  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  });
}

/* ── Active nav highlight ── */
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', function() {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    this.classList.add('active');
  });
});

/* ── Datos de gráfica editable ── */
const chartData = [
  // Ejemplo:
  // { label: 'Ene', val: 10, active: false },
  // { label: 'Feb', val: 20, active: true },
];

const chartEl = document.getElementById('activityChart');

if (chartEl && chartData.length > 0) {
  const max = Math.max(...chartData.map(d => d.val));

  chartData.forEach(d => {
    const height = Math.round((d.val / max) * 130);
    const wrap = document.createElement('div');
    wrap.className = 'chart-bar-wrap';
    wrap.innerHTML = `
      <div class="chart-bar${d.active ? ' active' : ''}" style="height:${height}px" title="${d.val}"></div>
      <div class="chart-label">${d.label}</div>
    `;
    chartEl.appendChild(wrap);
  });
}

/* ── Efecto visual del buscador ── */
const searchInput = document.querySelector('.topbar-search input');

if (searchInput) {
  searchInput.addEventListener('focus', function() {
    this.closest('.topbar-search').style.borderColor = 'var(--primary)';
  });

  searchInput.addEventListener('blur', function() {
    this.closest('.topbar-search').style.borderColor = '';
  });
}
</script>

</body>
</html>
